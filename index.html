<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sign Up</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <!-- Left decorative panel -->
        <aside>
            <div class="logo">
                <div class="logo-image">
                    <img src="image/odin-lined.png" alt="odin logo">
                </div>
                <div class="logo-text">
                    <h1>ODIN</h1>
                </div>
            </div>
        </aside>

        <!-- Right primary content -->
        <main>
            <section>
                <div class="intro">
                    <p>This is not a real online service! You know
                        you need something in your life to help you realize
                        your deepest dreams.<br> 
                        Sign up now to get started.
                    </p>
                    <p><b>You <em>know</em> you want to</b></p>
                </div>
                <div class="form-container">
                    <p>Let's do this!</p>
                    <form action="" method="post">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="first-name">First Name</label>
                                <input type="text" id="first-name" name="first-name" required>
                            </div>
                            <div class="form-group">
                                <label for="last-name">Last Name</label>
                                <input type="text" id="last-name" name="last-name" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" name="email" required>
                            </div>
                            <div class="form-group">
                                <label for="phone-number">Phone Number</label>
                                <input type="tel" id="phone-number" name="phone-number" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="password">Password</label>
                                <input type="password" id="password" name="password" required>
                            </div>
                            <div class="form-group">
                                <label for="confirm-password">Confirm Password</label>
                                <input type="password" id="confirm-password" name="confirm-password" required>
                            </div>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </body>
</html>
